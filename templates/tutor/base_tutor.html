<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Tutor Nanotecnología 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --nano-green: #2E7D32;
            --nano-light: #f8f9fa;
            --nano-dark: #1b3d2f;
            --sidebar-width: 280px;
            --navbar-height: 75px;
        }

        body {
            background-color: var(--nano-light);
            font-family: 'Segoe UI', sans-serif;
        }

        /* CINTILLO FIJO */
        .navbar-tutor {
            background: linear-gradient(90deg, var(--nano-dark) 0%, var(--nano-green) 100%);
            border-bottom: 3px solid #FFC107;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1030;
            height: var(--navbar-height);
        }

        /* SIDEBAR FIJO */
        .sidebar {
            position: fixed;
            top: var(--navbar-height);
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: white;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            z-index: 1000;
            overflow-y: auto;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        /* CONTENIDO DESPLAZABLE */
        .main-content {
            margin-top: var(--navbar-height);
            margin-left: var(--sidebar-width);
            padding: 2rem;
            min-height: calc(100vh - var(--navbar-height));
        }

        @media (max-width: 767.98px) {
            .sidebar {
                position: static;
                width: 100%;
                height: auto;
            }

            .main-content {
                margin-left: 0;
            }
        }

        .nav-link {
            color: var(--nano-dark);
            font-weight: 500;
            border-radius: 8px;
            margin-bottom: 5px;
        }

            .nav-link:hover, .nav-link.active {
                background-color: #e8f5e9;
                color: var(--nano-green);
            }

        .card-custom {
            border: none;
            border-radius: 15px;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

            .card-custom:hover {
                transform: translateY(-5px);
            }

        .logo-nav {
            height: 40px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-tutor">
        <div class="container-fluid">
            <img style="width: 250px; height: auto;" src="/static/cintillo3.png" class="logo-nav me-3 d-none d-md-block" alt="Cintillo">

            <div class="mx-auto" style="margin-left:50%;">
                <span class="navbar-brand fw-bold text-uppercase d-none d-lg-inline" style="margin-left:50%;">Panel de Gestión 2026</span>
            </div>

            <div class="ms-auto d-flex align-items-center">
                <span class="text-white me-3 d-none d-sm-inline small">
                    <i class="bi bi-person-circle me-1"></i> {{ current_user.username }}
                </span>
                <a href="/logout" class="btn btn-outline-light btn-sm rounded-pill px-3">Salir</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="sidebar d-md-block shadow-sm">
                <div class="text-center mb-4">
                    <img style="width: 100%; height: auto;" src="/static/semilleros.png" class="img-fluid px-2" alt="Semilleros">
                </div>

                <ul class="nav flex-column">
                    {% if 'tutor' in current_user.rol %}
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/tutor/dashboard' %}active{% endif %}" href="/tutor/dashboard">
                            <i class="bi bi-people me-2"></i> Mis Jóvenes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/tutor/registrar_joven' %}active{% endif %}" href="/tutor/registrar_joven">
                            <i class="bi bi-person-plus me-2"></i> Registrar Joven
                        </a>
                    </li>
                    {% endif %}

                    {% if 'evaluador' in current_user.rol %}
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/evaluador/cargar_notas' %}active{% endif %}" href="/evaluador/cargar_notas">
                            <i class="bi bi-journal-check me-2"></i> Cargar Notas
                        </a>
                    </li>
                    {% endif %}

                    <hr class="my-3">

                    <li class="nav-item">
                        <a class="nav-link" href="javascript:void(0)" style="cursor: default;">
                            <i class="bi bi-gear me-2"></i> Mi Perfil
                        </a>
                    </li>
                </ul>

                <div class="text-center mt-auto py-4">
                    <img src="/static/mision_ciencia.png" style="width: 200px; margin-top:100%;" alt="Misión">
                </div>
            </nav>

            <main class="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
